---
name: github-actions-runners

x-runner-common: &runner-common
  build:
    context: .
    dockerfile: Dockerfile
  image: ${RUNNER_IMAGE_NAME:-local/github-app-actions-runner:latest}
  restart: unless-stopped
  env_file:
    - path: .env
      required: false
  # The GitHub App PEM is mounted read-only from the host path set in
  # GITHUB_APP_PRIVATE_KEY_HOST_PATH and appears inside the container at
  # /run/secrets/github_app_key (matched by GITHUB_APP_PRIVATE_KEY_FILE).
  volumes:
    - ${GITHUB_APP_PRIVATE_KEY_HOST_PATH:?GITHUB_APP_PRIVATE_KEY_HOST_PATH must be set to the absolute host path of the GitHub App PEM file}:/run/secrets/github_app_key:ro
  # Runners reach the Docker daemon through socket-proxy (same Compose
  # project network) — they do not mount the host socket directly.
  # DOCKER_HOST is set per-service in each runner's environment block.
  tmpfs:
    - /tmp:size=1g,exec
    - /runner-tmp:size=128m,noexec,mode=0700,uid=${RUNNER_UID:-1001}
  security_opt:
    - no-new-privileges:true

services:
  runner-1:
    <<: *runner-common
    hostname: ${RUNNER_CONTAINER_PREFIX:-gha-runner}-1
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID}
      GITHUB_APP_PRIVATE_KEY_FILE: /run/secrets/github_app_key
      GITHUB_HOST: ${GITHUB_HOST:-github.com}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_WEB_URL: ${GITHUB_WEB_URL:-https://github.com}
      RUNNER_SCOPE: ${RUNNER_SCOPE:-org}
      GITHUB_ORG: ${GITHUB_ORG:-}
      GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:-}
      GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:-}
      RUNNER_GROUP: ${RUNNER_GROUP:-Default}
      RUNNER_WORKDIR: ${RUNNER_WORKDIR:-/home/runner/_work}
      UNSET_CONFIG_VARS: ${UNSET_CONFIG_VARS:-true}
      RUNNER_INSTANCE_NAME: ${RUNNER_1_NAME:-}
      RUNNER_DEFAULT_LABELS: ${RUNNER_DEFAULT_LABELS:-self-hosted,linux,x64,docker,ephemeral}
      RUNNER_EXTRA_LABELS: ${RUNNER_1_LABELS:-lint,small}

  runner-2:
    <<: *runner-common
    hostname: ${RUNNER_CONTAINER_PREFIX:-gha-runner}-2
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID}
      GITHUB_APP_PRIVATE_KEY_FILE: /run/secrets/github_app_key
      GITHUB_HOST: ${GITHUB_HOST:-github.com}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_WEB_URL: ${GITHUB_WEB_URL:-https://github.com}
      RUNNER_SCOPE: ${RUNNER_SCOPE:-org}
      GITHUB_ORG: ${GITHUB_ORG:-}
      GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:-}
      GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:-}
      RUNNER_GROUP: ${RUNNER_GROUP:-Default}
      RUNNER_WORKDIR: ${RUNNER_WORKDIR:-/home/runner/_work}
      UNSET_CONFIG_VARS: ${UNSET_CONFIG_VARS:-true}
      RUNNER_INSTANCE_NAME: ${RUNNER_2_NAME:-}
      RUNNER_DEFAULT_LABELS: ${RUNNER_DEFAULT_LABELS:-self-hosted,linux,x64,docker,ephemeral}
      RUNNER_EXTRA_LABELS: ${RUNNER_2_LABELS:-lint,medium}

  runner-3:
    <<: *runner-common
    hostname: ${RUNNER_CONTAINER_PREFIX:-gha-runner}-3
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID}
      GITHUB_APP_PRIVATE_KEY_FILE: /run/secrets/github_app_key
      GITHUB_HOST: ${GITHUB_HOST:-github.com}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_WEB_URL: ${GITHUB_WEB_URL:-https://github.com}
      RUNNER_SCOPE: ${RUNNER_SCOPE:-org}
      GITHUB_ORG: ${GITHUB_ORG:-}
      GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:-}
      GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:-}
      RUNNER_GROUP: ${RUNNER_GROUP:-Default}
      RUNNER_WORKDIR: ${RUNNER_WORKDIR:-/home/runner/_work}
      UNSET_CONFIG_VARS: ${UNSET_CONFIG_VARS:-true}
      RUNNER_INSTANCE_NAME: ${RUNNER_3_NAME:-}
      RUNNER_DEFAULT_LABELS: ${RUNNER_DEFAULT_LABELS:-self-hosted,linux,x64,docker,ephemeral}
      RUNNER_EXTRA_LABELS: ${RUNNER_3_LABELS:-general}

  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    environment:
      # Allowed: image pull/build operations only.
      # CONTAINERS is intentionally omitted: enabling it allows workflow jobs to
      # call GET /containers/{id}/json on sibling runners and read their
      # environment variables, and POST /containers/{id}/exec to run arbitrary
      # commands inside a sibling runner container.
      # If workflow jobs require `docker run`, add CONTAINERS: 1 and document
      # the cross-runner inspection risk in your security model.
      IMAGES: 1
      BUILD: 1
      POST: 1
      INFO: 1
      PING: 1

# To add another runner, copy one of the runner-* services and change:
# - service name
# - hostname
# - RUNNER_INSTANCE_NAME variable
# - RUNNER_EXTRA_LABELS variable (per-runner labels; combined with RUNNER_DEFAULT_LABELS
#   by entrypoint.sh to form the final label set passed to config.sh)
